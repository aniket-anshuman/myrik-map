<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Reporting System</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 20px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        .header h1 {
            font-size: 2.2em;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .header p {
            font-size: 1em;
            opacity: 0.95;
        }

        /* Tab Navigation */
        .tab-navigation {
            background: white;
            border-bottom: 2px solid #e0e0e0;
            padding: 0;
            display: flex;
            justify-content: center;
            gap: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 18px 40px;
            font-size: 1.05em;
            font-weight: 600;
            color: #666;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            border-bottom: 3px solid transparent;
        }

        .tab-btn:hover {
            color: #667eea;
            background: #f9f9f9;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: white;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            position: relative;
        }

        /* Tab Content */
        .tab-content {
            display: none !important;
            animation: fadeIn 0.3s ease;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .tab-content.active {
            display: block !important;
            position: relative;
        }

        /* Ensure only active tab is visible */
        #report.tab-content,
        #map.tab-content,
        #constituency.tab-content {
            display: none !important;
        }

        #report.tab-content.active,
        #map.tab-content.active,
        #constituency.tab-content.active {
            display: block !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Report Tab Layout */
        .report-layout {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: box-shadow 0.3s;
        }

        .card:hover {
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.4em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.95em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .coords-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* Image Upload */
        .image-upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            background: #f8f9ff;
            transition: all 0.3s;
        }

        .image-upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .image-upload-area input {
            display: none;
        }

        .image-upload-area p {
            color: #667eea;
            font-weight: 600;
            margin: 0 0 5px 0;
        }

        .image-upload-area small {
            color: #999;
        }

        .image-preview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 6px;
            margin-top: 12px;
            object-fit: contain;
        }

        .image-name {
            color: #667;
            font-size: 0.9em;
            margin-top: 8px;
            word-break: break-all;
        }

        /* Buttons */
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            width: 100%;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-small {
            padding: 8px 16px;
            font-size: 0.9em;
            width: 100%;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2.2em;
            margin: 0 0 8px 0;
        }

        .stat-card p {
            font-size: 0.95em;
            opacity: 0.95;
            margin: 0;
        }

        .stat-card.alt {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        /* Category Breakdown */
        .category-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .category-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }

        .category-name {
            font-weight: 600;
            color: #333;
        }

        .category-count {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 600;
        }

        /* Map Tab */
        .map-tab-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .map-toolbar {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .toolbar-section {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toolbar-label {
            font-weight: 600;
            color: #333;
            font-size: 0.95em;
        }

        .toolbar-section select {
            padding: 8px 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 0.95em;
            cursor: pointer;
        }

        .toolbar-section button {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .toolbar-section button:hover {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .map-container {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            height: 700px;
            width: 100%;
            display: block !important;
        }

        #mapLeaflet {
            height: calc(100vh - 120px);
            width: 100%;
            background: #e5e3df;
            display: block !important;
            border-radius: 10px;
        }

        #mapConstituency {
            height: calc(100vh - 120px);
            width: 100%;
            background: #e5e3df;
            display: block !important;
            border-radius: 10px;
        }

        #map.tab-content {
            display: none !important;
            height: auto;
            width: 100%;
            padding: 0;
            overflow: hidden;
        }

        #map.tab-content.active {
            display: block !important;
        }

        #constituency.tab-content {
            display: none !important;
            padding: 0;
            overflow: hidden;
        }

        #constituency.tab-content.active {
            display: block !important;
        }

        /* Map Stats Overlay */
        .map-stats {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .map-stat-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .map-stat-item h4 {
            font-size: 1.8em;
            margin: 0 0 5px 0;
        }

        .map-stat-item p {
            font-size: 0.9em;
            opacity: 0.9;
            margin: 0;
        }

        /* Alert */
        #alertContainer {
            position: fixed;
            top: 120px;
            right: 20px;
            z-index: 999;
            max-width: 350px;
        }

        .alert {
            padding: 15px;
            background: white;
            border-left: 4px solid #667eea;
            border-radius: 6px;
            margin-bottom: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            animation: slideIn 0.3s ease;
        }

        .alert-success {
            border-left-color: #51cf66;
            color: #155724;
        }

        .alert-danger {
            border-left-color: #ff6b6b;
            color: #721c24;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 1200px) {
            .report-layout {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 768px) {
            .report-layout {
                grid-template-columns: 1fr;
            }

            .tab-btn {
                padding: 15px 25px;
                font-size: 0.95em;
            }

            .header h1 {
                font-size: 1.6em;
            }

            .coords-row {
                grid-template-columns: 1fr;
            }

            #map {
                height: 400px;
            }

            .map-stats {
                grid-template-columns: 1fr;
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 1.1em;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>🗺️ Issue Reporting System</h1>
        <p>Report and track location-based civic issues</p>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-navigation">
        <button class="tab-btn active" data-tab="report">
            📝 Report Issue
        </button>
        <button class="tab-btn" data-tab="map">
            🗺️ Map View
        </button>
        <button class="tab-btn" data-tab="constituency">
            🏛️ Constituencies
        </button>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer"></div>

    <!-- Container -->
    <div class="container">
        <!-- ===================================== -->
        <!-- TAB 1: REPORT ISSUE -->
        <!-- ===================================== -->
        <div id="report" class="tab-content active">
            <div class="report-layout">
                <!-- Form Card -->
                <div class="card">
                    <h2>📝 Report New Issue</h2>
                    <form id="issueForm">
                        <div class="form-group">
                            <label for="issueDescription">Issue Description *</label>
                            <textarea id="issueDescription" name="issue"
                                placeholder="Describe the issue in detail..." required></textarea>
                        </div>

                        <div class="form-group">
                            <label for="category">Category *</label>
                            <select id="category" name="category" required>
                                <option value="">Select a category</option>
                                <option value="Road Damage">Road Damage</option>
                                <option value="Pothole">Pothole</option>
                                <option value="Street Light">Street Light</option>
                                <option value="Sidewalk Issue">Sidewalk Issue</option>
                                <option value="Traffic Sign">Traffic Sign</option>
                                <option value="Drainage Issue">Drainage Issue</option>
                                <option value="Vegetation Issue">Vegetation Issue</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Location (Latitude & Longitude) *</label>
                            <div class="coords-row">
                                <input type="number" id="latitude" name="latitude"
                                    placeholder="Latitude" step="0.000001" required>
                                <input type="number" id="longitude" name="longitude"
                                    placeholder="Longitude" step="0.000001" required>
                            </div>
                            <button type="button" class="btn btn-secondary btn-small"
                                id="getCurrentLocation" style="margin-top: 10px;">
                                📍 Use Current Location
                            </button>
                            <div id="detectedConstituency" style="margin-top: 12px; padding: 10px; background: #f0f7ff; border-left: 4px solid #667eea; border-radius: 4px; display: none;">
                                <small style="color: #666;">🏛️ Detected Constituency: <strong id="constituencyName" style="color: #667eea;"></strong></small>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Upload Image *</label>
                            <div class="image-upload-area" id="uploadArea">
                                <p>📸 Click to upload or drag and drop</p>
                                <small>JPEG, PNG, GIF, WebP (Max 5MB)</small>
                                <input type="file" id="imageInput" name="image" accept="image/*" required>
                            </div>
                            <div id="imagePreviewContainer"></div>
                            <div id="imageName" class="image-name"></div>
                        </div>

                        <button type="submit" class="btn btn-primary">Submit Issue</button>
                    </form>
                </div>

                <!-- Statistics Card -->
                <div class="card">
                    <h2>📊 Dashboard</h2>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3 id="totalCount">0</h3>
                            <p>Total Issues</p>
                        </div>
                        <div class="stat-card alt">
                            <h3 id="openCount">0</h3>
                            <p>Open Issues</p>
                        </div>
                    </div>

                    <h3 style="margin-top: 25px; margin-bottom: 15px; color: #333;">Issues by Category</h3>
                    <div id="categoryStats" class="category-list"></div>
                </div>

                <!-- Recent Issues Card -->
                <div class="card">
                    <h2>🕐 Recent Issues</h2>
                    <div id="recentIssues" style="display: flex; flex-direction: column; gap: 10px; max-height: 400px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>

        <!-- ===================================== -->
        <!-- TAB 2: MAP VIEW -->
        <!-- ===================================== -->
        <div id="map" class="tab-content">
            <!-- Full-screen Map -->
            <div id="mapLeaflet" style="height: calc(100vh - 120px); width: 100%; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1);"></div>
        </div>

        <!-- ===================================== -->
        <!-- TAB 3: CONSTITUENCY MAP -->
        <!-- ===================================== -->
        <div id="constituency" class="tab-content">
            <!-- Full-screen Map -->
            <div id="mapConstituency" style="height: calc(100vh - 120px); width: 100%; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.1);"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

    <!-- Map Managers -->
    <script src="map-leaflet.js"></script>
    <script src="map-constituency.js"></script>

    <!-- Application -->
    <script src="app.js"></script>

    <!-- Tab Management & Map Integration -->
    <script>
        // Store reference to app for later use
        let appInstance = null;

        // Unified Tab Navigation Handler
        function setupTabNavigation(app) {
            console.log('🎛️ setupTabNavigation() called');
            appInstance = app;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                console.log('📑 Adding tab listener to:', btn.dataset.tab);
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const tabName = this.dataset.tab;
                    console.log('📑 Tab clicked:', tabName);

                    // Update active tab button
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.remove('active');
                    });
                    this.classList.add('active');

                    // Update active tab content
                    document.querySelectorAll('.tab-content').forEach(content => {
                        content.classList.remove('active');
                    });
                    const tabContent = document.getElementById(tabName);
                    if (tabContent) {
                        tabContent.classList.add('active');
                        console.log('✅ Tab ' + tabName + ' is now active');
                    }

                    // Handle map-specific logic
                    if (tabName === 'map') {
                        // Hide constituency map if visible
                        const constMap = document.getElementById('mapConstituency');
                        if (constMap) constMap.style.display = 'none';

                        setTimeout(() => {
                            console.log('🗺️ Map tab activated, initializing map...');
                            if (app && app.initializeMapIfNeeded) {
                                app.initializeMapIfNeeded();
                            }
                            // Also invalidate size
                            if (app && app.mapManager && app.mapManager.map) {
                                app.mapManager.map.invalidateSize();
                                console.log('✅ Map size invalidated');
                            }
                        }, 100);
                    }

                    // Handle constituency map-specific logic
                    if (tabName === 'constituency') {
                        // Hide regular map if visible
                        const regularMap = document.getElementById('mapLeaflet');
                        if (regularMap) regularMap.style.display = 'none';

                        setTimeout(() => {
                            console.log('🏛️ Constituency tab activated, initializing...');
                            // Show constituency map
                            const constMap = document.getElementById('mapConstituency');
                            if (constMap) constMap.style.display = 'block';

                            if (app && app.initializeConstituencyMapIfNeeded) {
                                app.initializeConstituencyMapIfNeeded();
                            }
                            // Invalidate size
                            if (app && app.constituencyMapManager && app.constituencyMapManager.map) {
                                app.constituencyMapManager.map.invalidateSize();
                                console.log('✅ Constituency map size invalidated');
                            }
                        }, 100);
                    }
                });
            });
        }

        // Extend IssueReportingApp with map functionality
        const OriginalApp = IssueReportingApp;

        class IssueReportingAppWithMapTab extends OriginalApp {
            constructor() {
                console.log('👷 IssueReportingAppWithMapTab constructor called');
                super();
                this.mapManager = null;
                this.constituencyMapManager = null;
                this.isSubmitting = false; // Prevent double submissions
                this.isProcessingImage = false; // Prevent double image processing
                this.lastSubmitTime = 0; // Track last submission time
                this.lastSubmitId = null; // Track last submission to avoid duplicates
            }

            init() {
                console.log('🚀 Extended init() called, listenersSetup =', this.listenersSetup);
                this.setupEventListeners();

                // Initialize maps (but don't load them yet - lazy load)
                this.mapInitialized = false;
                this.constituencyMapInitialized = false;

                // Load issues from API on page load
                console.log('📡 Loading issues from API...');
                this.loadIssuesFromAPI();
                this.populateCategoryFilter();
                console.log('✅ App initialization complete');
            }

            setupEventListeners() {
                console.log('🔧 Extended setupEventListeners() called, listenersSetup =', this.listenersSetup);
                // Check if already setup to prevent duplicate listeners
                if (this.listenersSetup) {
                    console.log('⚠️ Extended listeners already setup, skipping');
                    return;
                }

                console.log('🔧 Extended class setting up listeners');

                // Call parent setup first (this sets listenersSetup = true)
                console.log('⬆️ Calling super.setupEventListeners()...');
                super.setupEventListeners();
                console.log('✅ Returned from super.setupEventListeners()');

                // Setup unified tab navigation
                setupTabNavigation(this);

                // Detect constituency when coordinates change
                const latInput = document.getElementById('latitude');
                const lngInput = document.getElementById('longitude');
                if (latInput && lngInput) {
                    const detectConstituency = () => this.detectAndDisplayConstituency();
                    latInput.addEventListener('change', detectConstituency);
                    lngInput.addEventListener('change', detectConstituency);
                    latInput.addEventListener('blur', detectConstituency);
                    lngInput.addEventListener('blur', detectConstituency);
                }


            }

            async initializeMapIfNeeded() {
                if (this.mapInitialized) {
                    console.log('✅ Map already initialized, refreshing size...');
                    if (this.mapManager && this.mapManager.map) {
                        setTimeout(() => {
                            this.mapManager.map.invalidateSize();
                            console.log('✅ Map size refreshed');
                        }, 100);
                    }
                    return;
                }

                try {
                    // Check if Leaflet is loaded
                    if (typeof L === 'undefined') {
                        console.error('❌ Leaflet library not loaded');
                        this.showAlert('Map library failed to load', 'danger');
                        return;
                    }

                    // Check if map container exists and is visible
                    const mapContainer = document.getElementById('mapLeaflet');
                    if (!mapContainer) {
                        console.error('❌ Map container (mapLeaflet) not found');
                        return;
                    }
                    console.log('✅ Map container found:', mapContainer);

                    // Ensure data is loaded before initializing map
                    if (this.issues.length === 0) {
                        console.log('📡 Loading issues before map initialization...');
                        await this.loadIssuesFromAPI();
                    }

                    console.log(`🗺️ Initializing map with ${this.issues.length} issues`);
                    this.mapManager = new LeafletMapManager('mapLeaflet');
                    console.log('✅ LeafletMapManager created');

                    this.issues.forEach(issue => {
                        console.log(`📍 Adding marker: ${issue.issue}`);
                        this.mapManager.addMarker(issue);
                    });

                    // Force Leaflet to recalculate size after initialization
                    setTimeout(() => {
                        if (this.mapManager && this.mapManager.map) {
                            this.mapManager.map.invalidateSize();
                            console.log('✅ Map size calculated');
                        }
                    }, 100);

                    this.mapInitialized = true;
                    console.log('✅ Map initialized successfully with ' + Object.keys(this.mapManager.markers).length + ' markers');
                } catch (error) {
                    console.error('❌ Error initializing map:', error);
                    this.showAlert('Error initializing map: ' + error.message, 'danger');
                }
            }

            async initializeConstituencyMapIfNeeded() {
                if (this.constituencyMapInitialized) {
                    console.log('✅ Constituency map already initialized, refreshing size...');
                    if (this.constituencyMapManager && this.constituencyMapManager.map) {
                        try {
                            this.constituencyMapManager.map.invalidateSize();
                            console.log('✅ Constituency map size refreshed');
                        } catch (e) {
                            console.warn('⚠️ Map size refresh failed:', e.message);
                        }
                    }
                    return;
                }

                try {
                    if (typeof L === 'undefined') {
                        console.error('❌ Leaflet library not loaded');
                        this.showAlert('Map library failed to load', 'danger');
                        return;
                    }

                    const mapContainer = document.getElementById('mapConstituency');
                    if (!mapContainer) {
                        console.error('❌ Map container (mapConstituency) not found');
                        return;
                    }

                    console.log('🏛️ Initializing constituency map...');

                    if (this.issues.length === 0) {
                        console.log('📡 Loading issues before constituency map initialization...');
                        await this.loadIssuesFromAPI();
                    }

                    // Create new instance only if it doesn't exist
                    if (!this.constituencyMapManager) {
                        this.constituencyMapManager = new ConstituencyMapManager('mapConstituency', './india_pc_2019.json');
                        window.constituencyMapManager = this.constituencyMapManager;

                        await this.constituencyMapManager.loadConstituencies();
                    }

                    this.constituencyMapManager.updateIssueStats(this.issues);

                    setTimeout(() => {
                        if (this.constituencyMapManager && this.constituencyMapManager.map) {
                            try {
                                this.constituencyMapManager.map.invalidateSize();
                                this.constituencyMapManager.fitToConstituencies();
                                console.log('✅ Constituency map size calculated and fitted');
                            } catch (e) {
                                console.warn('⚠️ Map sizing error:', e.message);
                            }
                        }
                    }, 200);

                    this.constituencyMapInitialized = true;
                    console.log('✅ Constituency map ready');
                } catch (error) {
                    console.error('❌ Error initializing constituency map:', error);
                    this.constituencyMapInitialized = false; // Reset flag on error
                    this.showAlert('Error initializing constituency map: ' + error.message, 'danger');
                }
            }

            async handleFormSubmit(e) {
                e.preventDefault();
                e.stopPropagation(); // Prevent event bubbling

                // Prevent double submissions - check if submission is in progress
                if (this.isSubmitting) {
                    console.log('⏳ Submission already in progress, ignoring duplicate');
                    return;
                }

                // Prevent duplicate submissions within 1 second
                const now = Date.now();
                if (now - this.lastSubmitTime < 1000) {
                    console.log('⏳ Duplicate submission detected within 1 second, ignoring');
                    return;
                }

                this.lastSubmitTime = now;
                this.isSubmitting = true;

                // Generate unique submission ID to prevent duplicates
                const submissionId = `submit_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                console.log(`📤 Starting form submission [${submissionId}]...`);

                // Disable submit button while processing
                const submitBtn = document.querySelector('#issueForm button[type="submit"]');
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = '⏳ Submitting...';
                }

                try {
                    const formData = new FormData(document.getElementById('issueForm'));
                    const issue = formData.get('issue');
                    const category = formData.get('category');
                    const latitude = parseFloat(formData.get('latitude'));
                    const longitude = parseFloat(formData.get('longitude'));

                    if (!this.currentImageFile) {
                        this.showAlert('Please select an image', 'danger');
                        this.isSubmitting = false;
                        return;
                    }

                    if (!this.validateCoordinates(latitude, longitude)) {
                        this.showAlert('Invalid coordinates', 'danger');
                        this.isSubmitting = false;
                        return;
                    }

                    // Detect constituency - initialize if needed
                    let constituency = 'Unknown';

                    // If constituency map not initialized, initialize it now for detection
                    if (!this.constituencyMapManager) {
                        console.log('⏳ Initializing constituency manager for detection...');
                        this.constituencyMapManager = new ConstituencyMapManager('mapConstituency', './india_pc_2019.json');
                        window.constituencyMapManager = this.constituencyMapManager;
                        await this.constituencyMapManager.loadConstituencies();
                    }

                    // Detect constituency from coordinates
                    if (this.constituencyMapManager && this.constituencyMapManager.constituencies) {
                        const detected = this.constituencyMapManager.getConstituencyForPoint(latitude, longitude);
                        if (detected) {
                            constituency = detected;
                            console.log(`📍 Auto-detected constituency: ${constituency}`);
                            this.showAlert(`📍 Detected: ${constituency}`, 'success');
                        } else {
                            console.log(`⚠️ Could not detect constituency for ${latitude}, ${longitude}`);
                            this.showAlert('⚠️ Coordinates outside India', 'warning');
                        }
                    }

                    console.log(`📡 Sending API request [${submissionId}]...`);
                    const response = await fetch(`${this.apiBaseUrl}/issues`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            issue: issue,
                            category: category,
                            latitude: latitude,
                            longitude: longitude,
                            constituency: constituency,
                            imageData: this.currentImageFile,
                            imageName: this.currentImageFile.name || 'image',
                            _submissionId: submissionId // Unique ID to prevent duplicates
                        })
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.message || 'Error creating issue');
                    }

                    // Add to map if already initialized
                    if (this.mapInitialized && this.mapManager) {
                        this.mapManager.addMarker(result.data);
                    }

                    // Update constituency map if initialized
                    if (this.constituencyMapInitialized && this.constituencyMapManager) {
                        this.loadIssuesFromAPI().then(() => {
                            this.constituencyMapManager.updateIssueStats(this.issues);
                            this.constituencyMapManager.displayConstituencies();
                        });
                    }

                    this.resetForm();

                    // Reload issues from API
                    await this.loadIssuesFromAPI();

                    // Update maps if initialized
                    if (this.mapInitialized && this.mapManager) {
                        console.log('🗺️ Updating regular map...');
                        this.mapManager.addMarker(result.data);
                    }

                    if (this.constituencyMapInitialized && this.constituencyMapManager) {
                        console.log('🏛️ Updating constituency map...');
                        this.constituencyMapManager.updateIssueStats(this.issues);
                        this.constituencyMapManager.displayConstituencies();
                    }

                    this.showAlert('✅ Issue reported successfully!', 'success');
                    console.log(`✅ Form submission completed [${submissionId}]`);
                } catch (error) {
                    console.error('❌ Error:', error);
                    this.showAlert(`Error: ${error.message}`, 'danger');
                } finally {
                    this.isSubmitting = false;

                    // Re-enable submit button
                    const submitBtn = document.querySelector('#issueForm button[type="submit"]');
                    if (submitBtn) {
                        submitBtn.disabled = false;
                        submitBtn.textContent = 'Submit Issue';
                    }

                    console.log('🔓 Submission lock released');
                }
            }

            async deleteIssue(id) {
                if (!confirm('Are you sure you want to delete this issue?')) return;

                try {
                    const response = await fetch(`${this.apiBaseUrl}/issues/${id}`, {
                        method: 'DELETE'
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.message || 'Error deleting issue');
                    }

                    // Remove from map if initialized
                    if (this.mapInitialized && this.mapManager) {
                        this.mapManager.removeMarker(id);
                    }

                    this.loadIssuesFromAPI();
                    this.showAlert('Issue deleted successfully', 'success');
                } catch (error) {
                    console.error('Error:', error);
                    this.showAlert(`Error: ${error.message}`, 'danger');
                }
            }

            async updateIssueStatus(id, status) {
                try {
                    const response = await fetch(`${this.apiBaseUrl}/issues/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: status })
                    });

                    const result = await response.json();

                    if (!response.ok) {
                        throw new Error(result.message || 'Error updating issue');
                    }

                    const issue = result.data;

                    // Update marker on map if initialized
                    if (this.mapInitialized && this.mapManager) {
                        this.mapManager.updateMarker(issue);
                    }

                    this.loadIssuesFromAPI();
                    this.showAlert(`Issue marked as ${status}`, 'success');
                } catch (error) {
                    console.error('Error:', error);
                    this.showAlert(`Error: ${error.message}`, 'danger');
                }
            }

            updateMapStatistics() {
                if (!this.mapInitialized || !this.mapManager) return;

                const markers = this.mapManager.markers;
                const issues = Object.values(markers).map(m => m.issue);

                document.getElementById('mapTotalCount').textContent = issues.length;
                document.getElementById('mapOpenCount').textContent =
                    issues.filter(i => i.status === 'open').length;
                document.getElementById('mapInProgressCount').textContent =
                    issues.filter(i => i.status === 'in-progress').length;
                document.getElementById('mapResolvedCount').textContent =
                    issues.filter(i => i.status === 'resolved').length;
            }

            enrichIssuesWithConstituencies() {
                if (!this.constituencyMapManager || !this.constituencyMapManager.constituencies) return;

                this.issues.forEach(issue => {
                    if (!issue.constituency && issue.latitude && issue.longitude) {
                        const detected = this.constituencyMapManager.getConstituencyForPoint(
                            issue.latitude,
                            issue.longitude
                        );
                        if (detected) {
                            issue.constituency = detected;
                        }
                    }
                });

                console.log('✅ Enriched issues with constituency data');
            }

            handleImageSelect(e) {
                const files = e.target.files || e.dataTransfer?.files;
                if (!files || files.length === 0) {
                    console.log('⚠️ No file selected');
                    return;
                }

                const file = files[0];

                // Prevent double image processing
                if (this.isProcessingImage) {
                    console.log('⏳ Image already being processed, ignoring duplicate');
                    return;
                }

                this.isProcessingImage = true;
                console.log(`📸 Processing image: ${file.name} (${file.size} bytes)`);

                // Validate file
                if (!this.validateImageFile(file)) {
                    this.showAlert('Invalid file. Only images up to 5MB allowed.', 'danger');
                    this.isProcessingImage = false;
                    // Clear the input
                    const imageInput = document.getElementById('imageInput');
                    if (imageInput) imageInput.value = '';
                    return;
                }

                // Read file as base64
                const reader = new FileReader();

                reader.onload = (event) => {
                    this.currentImageFile = {
                        data: event.target.result,
                        name: file.name,
                        size: file.size,
                        type: file.type
                    };
                    const sizeMB = (file.size / 1024 / 1024).toFixed(2);
                    console.log(`✅ Image loaded: ${file.name} (${sizeMB}MB)`);
                    this.showImagePreview(event.target.result, file.name);
                    this.isProcessingImage = false;
                    console.log('🔒 Image processing complete');
                };

                reader.onerror = (error) => {
                    console.error('❌ Error reading file:', error);
                    this.showAlert('Error reading image file', 'danger');
                    this.isProcessingImage = false;
                    // Clear the input
                    const imageInput = document.getElementById('imageInput');
                    if (imageInput) imageInput.value = '';
                };

                try {
                    reader.readAsDataURL(file);
                } catch (error) {
                    console.error('❌ Error starting file read:', error);
                    this.showAlert('Error reading image file', 'danger');
                    this.isProcessingImage = false;
                    // Clear the input
                    const imageInput = document.getElementById('imageInput');
                    if (imageInput) imageInput.value = '';
                }
            }

            async detectAndDisplayConstituency() {
                const latInput = document.getElementById('latitude');
                const lngInput = document.getElementById('longitude');
                const detectedDiv = document.getElementById('detectedConstituency');
                const constituencyNameEl = document.getElementById('constituencyName');

                if (!latInput || !lngInput || !detectedDiv || !constituencyNameEl) {
                    console.warn('⚠️ Constituency detection elements not found');
                    return;
                }

                const lat = parseFloat(latInput.value);
                const lng = parseFloat(lngInput.value);

                if (isNaN(lat) || isNaN(lng)) {
                    detectedDiv.style.display = 'none';
                    return;
                }

                console.log(`🔍 Detecting constituency for ${lat}, ${lng}...`);

                // Initialize constituency manager if needed
                if (!this.constituencyMapManager) {
                    try {
                        console.log('📥 Loading constituencies...');
                        this.constituencyMapManager = new ConstituencyMapManager('mapConstituency', './india_pc_2019.json');
                        window.constituencyMapManager = this.constituencyMapManager;
                        await this.constituencyMapManager.loadConstituencies();
                        console.log(`✅ Loaded ${Object.keys(this.constituencyMapManager.constituencies).length} constituencies`);
                    } catch (error) {
                        console.error('❌ Error loading constituencies:', error);
                        detectedDiv.style.display = 'none';
                        return;
                    }
                }

                // Detect constituency
                if (this.constituencyMapManager && this.constituencyMapManager.constituencies) {
                    const detected = this.constituencyMapManager.getConstituencyForPoint(lat, lng);
                    if (detected) {
                        constituencyNameEl.textContent = detected;
                        detectedDiv.style.display = 'block';
                        console.log(`✅ Detected: ${detected}`);
                    } else {
                        detectedDiv.style.display = 'none';
                        console.log(`⚠️ No constituency found for ${lat}, ${lng} (outside India?)`);
                    }
                } else {
                    console.error('❌ Constituency manager not properly initialized');
                    detectedDiv.style.display = 'none';
                }
            }

            updateConstituencyStatistics() {
                if (!this.constituencyMapInitialized || !this.constituencyMapManager) return;

                // Enrich issues with constituency data first
                this.enrichIssuesWithConstituencies();

                const stats = this.constituencyMapManager.getConstituencyStats();
                const issuesList = Object.entries(stats).sort((a, b) => b[1] - a[1]);
                const totalIssues = Object.values(stats).reduce((a, b) => a + b, 0);
                const constWithIssues = Object.keys(stats).filter(c => stats[c] > 0).length;

                document.getElementById('constTotalIssues').textContent = totalIssues;
                document.getElementById('constConstituenciesWithIssues').textContent = constWithIssues;
                document.getElementById('constAveragePerConstituency').textContent =
                    constWithIssues > 0 ? (totalIssues / constWithIssues).toFixed(0) : '0';

                if (issuesList.length > 0) {
                    document.getElementById('constHighestConstituency').textContent =
                        issuesList[0][0].substring(0, 20) + (issuesList[0][0].length > 20 ? '...' : '');
                }

                // Update top constituencies
                const topConstDiv = document.getElementById('topConstituencies');
                topConstDiv.innerHTML = '';
                issuesList.slice(0, 10).forEach((entry, idx) => {
                    const [name, count] = entry;
                    const div = document.createElement('div');
                    div.className = 'category-item';
                    div.innerHTML = `
                        <span class="category-name">${idx + 1}. ${name}</span>
                        <span class="category-count">${count}</span>
                    `;
                    topConstDiv.appendChild(div);
                });
            }
        }

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            window.app = new IssueReportingAppWithMapTab();
        });
    </script>
</body>
</html>
