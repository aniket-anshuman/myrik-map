<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Reporting System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        /* Card Styles */
        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #333;
            margin-bottom: 25px;
            font-size: 1.5em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .coords-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Image Upload Styles */
        .image-upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9ff;
        }

        .image-upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .image-upload-area input[type="file"] {
            display: none;
        }

        .image-upload-area p {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .image-upload-area small {
            color: #999;
            display: block;
        }

        .image-preview {
            margin-top: 15px;
            max-width: 100%;
            border-radius: 5px;
            max-height: 200px;
            object-fit: contain;
        }

        .image-name {
            color: #666;
            font-size: 0.9em;
            margin-top: 10px;
        }

        /* Button Styles */
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-danger {
            background: #ff6b6b;
            color: white;
            padding: 8px 15px;
            font-size: 0.9em;
        }

        .btn-danger:hover {
            background: #ff5252;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.85em;
        }

        /* Statistics Dashboard */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-card h3 {
            font-size: 2em;
            margin-bottom: 5px;
        }

        .stat-card p {
            opacity: 0.9;
            font-size: 0.95em;
        }

        .stat-card.alt {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        /* Issues List */
        .issues-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .issue-item {
            background: #f9f9f9;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .issue-item:hover {
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
            transform: translateX(5px);
        }

        .issue-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 10px;
        }

        .issue-title {
            font-weight: 600;
            color: #333;
            flex: 1;
        }

        .issue-badge {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-left: 10px;
        }

        .issue-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.9em;
            color: #666;
        }

        .issue-detail {
            display: flex;
            align-items: center;
        }

        .issue-detail strong {
            margin-right: 5px;
            color: #333;
        }

        .issue-image {
            margin: 10px 0;
            max-height: 150px;
            border-radius: 5px;
            cursor: pointer;
        }

        .issue-actions {
            display: flex;
            gap: 10px;
        }

        .issue-date {
            font-size: 0.85em;
            color: #999;
            margin-top: 8px;
        }

        /* Filter Styles */
        .filter-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .filter-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            color: #999;
        }

        .modal-close:hover {
            color: #333;
        }

        .modal-image {
            width: 100%;
            margin: 20px 0;
            border-radius: 8px;
        }

        /* Alert Styles */
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #f5576c;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-layout {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .coords-row {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                margin: 20px;
                max-width: 90%;
            }
        }

        /* Scrollbar Styling */
        .issues-list::-webkit-scrollbar {
            width: 8px;
        }

        .issues-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .issues-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .issues-list::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .location-input-group {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 10px;
            align-items: flex-end;
        }

        .btn-locate {
            background: #667eea;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-locate:hover {
            background: #764ba2;
        }

        .category-count {
            font-size: 0.85em;
            color: #999;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🗺️ Issue Reporting System</h1>
            <p>Report location-based issues in your area</p>
        </div>

        <!-- Alert Messages -->
        <div id="alertContainer"></div>

        <!-- Main Layout -->
        <div class="main-layout">
            <!-- Left Panel: Form -->
            <div class="card">
                <h2>Report New Issue</h2>
                <form id="issueForm">
                    <!-- Issue Description -->
                    <div class="form-group">
                        <label for="issueDescription">Issue Description *</label>
                        <textarea id="issueDescription" name="issue" placeholder="Describe the issue in detail..." required></textarea>
                    </div>

                    <!-- Category -->
                    <div class="form-group">
                        <label for="category">Category *</label>
                        <select id="category" name="category" required>
                            <option value="">Select a category</option>
                            <option value="Road Damage">Road Damage</option>
                            <option value="Pothole">Pothole</option>
                            <option value="Street Light">Street Light</option>
                            <option value="Sidewalk Issue">Sidewalk Issue</option>
                            <option value="Traffic Sign">Traffic Sign</option>
                            <option value="Drainage Issue">Drainage Issue</option>
                            <option value="Vegetation Issue">Vegetation Issue</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>

                    <!-- Coordinates -->
                    <div class="form-group">
                        <label>Location (Latitude & Longitude) *</label>
                        <div class="coords-row">
                            <input type="number" id="latitude" name="latitude" placeholder="Latitude" step="0.000001" required>
                            <input type="number" id="longitude" name="longitude" placeholder="Longitude" step="0.000001" required>
                        </div>
                        <button type="button" class="btn-locate" id="getCurrentLocation">📍 Use Current Location</button>
                    </div>

                    <!-- Image Upload -->
                    <div class="form-group">
                        <label>Upload Image *</label>
                        <div class="image-upload-area" id="uploadArea">
                            <p>📸 Click to upload or drag and drop</p>
                            <small>JPEG, PNG, GIF, WebP (Max 5MB)</small>
                            <input type="file" id="imageInput" name="image" accept="image/*" required>
                        </div>
                        <div id="imagePreviewContainer"></div>
                        <div id="imageName" class="image-name"></div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn btn-primary">Submit Issue</button>
                </form>
            </div>

            <!-- Right Panel: Statistics -->
            <div class="card">
                <h2>Dashboard</h2>

                <!-- Stats Grid -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3 id="totalCount">0</h3>
                        <p>Total Issues</p>
                    </div>
                    <div class="stat-card alt">
                        <h3 id="openCount">0</h3>
                        <p>Open Issues</p>
                    </div>
                </div>

                <!-- Category Breakdown -->
                <h3 style="margin: 20px 0 15px; color: #333;">Issues by Category</h3>
                <div id="categoryStats"></div>

                <!-- Recent Activity -->
                <h3 style="margin: 20px 0 15px; color: #333;">Recent Issues</h3>
                <div id="recentIssues" class="issues-list"></div>
            </div>
        </div>

        <!-- Issues View -->
        <div class="card">
            <h2>All Issues</h2>

            <!-- Filters -->
            <div class="filter-group">
                <input type="text" id="searchInput" placeholder="Search issues...">
                <select id="categoryFilter">
                    <option value="">All Categories</option>
                </select>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="all">All Issues</button>
                <button class="tab-btn" data-tab="open">Open</button>
                <button class="tab-btn" data-tab="completed">Resolved</button>
            </div>

            <!-- Issues List -->
            <div id="allTab" class="tab-content active">
                <div id="issuesList" class="issues-list"></div>
            </div>
            <div id="openTab" class="tab-content">
                <div id="openIssuesList" class="issues-list"></div>
            </div>
            <div id="completedTab" class="tab-content">
                <div id="completedIssuesList" class="issues-list"></div>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">&times;</button>
            <img id="modalImage" class="modal-image" alt="Issue Image">
            <p id="modalTitle" style="text-align: center; color: #333; font-weight: 600;"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
